name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  # MSBuild liest Env-Variablen als Properties -> ueberschreibt die Default-Revision (1)
  # aus Directory.Build.targets konsistent fuer build UND pack (Assembly- + Paketversion gleich).
  BuildRevision: ${{ github.run_number }}

jobs:
  build:
    name: build · test · pack
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK (aus global.json)
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore Flirty.sln

      - name: Build (Release)
        run: dotnet build Flirty.sln -c Release --no-restore

      # Playwright-Browser (Chromium) für die Web-Sample-E2E (#45/#47). Das Skript wird beim Build
      # erzeugt; ohne diesen Schritt überspringen sich die E2E-Tests (SkippableFact) statt zu scheitern.
      - name: Playwright-Browser installieren
        run: pwsh tests/Flirty.E2E/bin/Release/net10.0/playwright.ps1 install --with-deps chromium

      # Bewusst zwei Läufe statt "dotnet test Flirty.sln": die Solution-Variante startet beide
      # Test-Assemblies PARALLEL. Die Playwright-E2E (echtes Kestrel + Browser) konkurriert dann auf den
      # zwei Kernen des Runners mit der Unit-Suite (inkl. Testcontainers) und läuft in Aktions-Timeouts.
      - name: Test (Unit/Integration)
        run: dotnet test tests/Flirty.Tests -c Release --no-build

      - name: Test (E2E, Playwright)
        run: dotnet test tests/Flirty.E2E -c Release --no-build

      - name: Pack (beide NuGet-Pakete)
        run: dotnet pack Flirty.sln -c Release --no-build -o artifacts

      - name: Upload NuGet-Artefakte
        uses: actions/upload-artifact@v4
        with:
          name: nupkg
          path: |
            artifacts/*.nupkg
            artifacts/*.snupkg
          if-no-files-found: error
